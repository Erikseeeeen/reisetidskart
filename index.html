<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="travel-time-api" content="http://127.0.0.1:8001" />
    <title>Reisetidskart</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main>
      <div id="map" aria-label="Reisetidskart"></div>

      <aside class="panel" aria-label="Kartinnstillinger">
        <header>
          <div class="status-line">
            <p class="eyebrow">Reisetidskart</p>
            <span id="engine-status" data-state="loading">Kobler til</span>
          </div>
          <h1>Reisetidskart</h1>
        </header>

        <section class="start-card" aria-labelledby="start-heading">
          <div>
            <p class="label" id="start-heading">Startpunkt</p>
            <output id="start-coordinates">Oslo S</output>
          </div>
        </section>

        <fieldset class="transport-picker">
          <legend>Transportmiddel</legend>
          <div class="transport-options">
            <label>
              <input type="radio" name="transport-mode" value="walk" />
              <span class="transport-option">Gange</span>
            </label>
            <label>
              <input type="radio" name="transport-mode" value="bicycle" />
              <span class="transport-option">Sykkel</span>
            </label>
            <label>
              <input type="radio" name="transport-mode" value="public_transport" checked />
              <span class="transport-option">Kollektiv</span>
            </label>
            <label>
              <input type="radio" name="transport-mode" value="car" />
              <span class="transport-option">Bil</span>
            </label>
          </div>
          <p class="departure-note">Kollektiv beregnes med avreise kl. 08.00.</p>
        </fieldset>

        <section class="legend" aria-labelledby="legend-heading">
          <div class="section-heading">
            <h2 id="legend-heading">Reisetid</h2>
            <span>minutter</span>
          </div>
          <div class="legend-gradient" aria-hidden="true"></div>
          <div class="legend-ticks" aria-hidden="true"></div>
        </section>

        <div class="field-readout" aria-live="polite">
          <span class="label">Under pekeren</span>
          <output id="field-value">Flytt pekeren over kartet</output>
        </div>
      </aside>

      <p class="map-hint">Klikk for å flytte startpunktet</p>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="app.js?v=5" defer></script>
  </body>
</html>
