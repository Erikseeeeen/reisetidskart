<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="travel-time-api" content="http://127.0.0.1:8001" />
    <title>Reisetidskart</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div id="map" aria-label="Reisetidskart"></div>

      <aside class="panel" aria-label="Kartinnstillinger">
        <header>
          <div class="status-line">
            <p class="eyebrow">Reisetidskart</p>
            <span id="engine-status" data-state="loading">Kobler til</span>
          </div>
          <h1>Reisetidskart</h1>
          <p class="intro">Klikk i kartet eller dra markøren for å velge startpunkt.</p>
        </header>

        <section class="start-card" aria-labelledby="start-heading">
          <div>
            <p class="label" id="start-heading">Startpunkt</p>
            <output id="start-coordinates">Oslo S</output>
          </div>
          <button id="reset-start" type="button">Tilbake til Oslo S</button>
        </section>

        <section class="palette-picker" aria-labelledby="palette-heading">
          <h2 id="palette-heading">Fargeskala</h2>
          <div class="palette-options" role="radiogroup" aria-label="Velg fargeskala">
            <button class="palette-option is-active" type="button" role="radio" aria-checked="true" data-scale="viridis"><span class="palette-swatch" aria-hidden="true"></span><span>Viridis</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="magma"><span class="palette-swatch" aria-hidden="true"></span><span>Magma</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="inferno"><span class="palette-swatch" aria-hidden="true"></span><span>Inferno</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="turbo"><span class="palette-swatch" aria-hidden="true"></span><span>Turbo</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="cividis"><span class="palette-swatch" aria-hidden="true"></span><span>Cividis</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="blueRed"><span class="palette-swatch" aria-hidden="true"></span><span>Blå–rød</span></button>
            <button class="palette-option" type="button" role="radio" aria-checked="false" data-scale="greyscale"><span class="palette-swatch" aria-hidden="true"></span><span>Gråtoner</span></button>
          </div>
        </section>

        <section class="legend" aria-labelledby="legend-heading">
          <div class="section-heading">
            <h2 id="legend-heading">Reisetid</h2>
            <span>minutter</span>
          </div>
          <div class="legend-gradient" aria-hidden="true"></div>
          <div class="legend-ticks" aria-hidden="true"></div>
        </section>

        <div class="field-readout" aria-live="polite">
          <span class="label">Under pekeren</span>
          <output id="field-value">Flytt pekeren over kartet</output>
        </div>
      </aside>

      <p class="palette-pill"><span>Fargeskala</span><strong id="palette-name">Viridis</strong></p>
      <p class="map-hint">Klikk for å flytte startpunktet</p>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="app.js" defer></script>
  </body>
</html>
